# Advanced Claude Code Review workflow
# Shows all 25 inputs with explanatory comments.
name: Claude Code Review

on:
  pull_request:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: |
      (github.event_name == 'pull_request' && (github.event.label.name == 'claude-review' || github.event.label.name == 'claude-deep-review')) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
      checks: read
    steps:
      - uses: toriihq/claude-review-action@v1
        with:
          # Required — your Anthropic API key
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Review Content
          review-guide-path: .github/claude-review-guide.md  # Path to your review guide
          context-intro: "You are a senior code reviewer for Acme Corp's backend services."
          critical-rules: |
            1. All database queries MUST use parameterized statements
            2. All API endpoints MUST check authentication
            3. No console.log in production code
          extra-prompt: "Pay special attention to error handling patterns."
          include-pr-description: 'true'

          # Limits
          max-files: '50'         # Skip review if PR has more files than this
          max-diff-lines: '3000'  # Truncate diff after N lines
          max-diff-bytes: '80000' # Truncate diff after N bytes
          max-turns: '30'         # Claude conversation turn limit
          timeout-minutes: '25'   # Informational — actual timeout set on job

          # Model & Tools
          model: 'claude-sonnet-4-6'
          allowed-tools: 'Bash,Read,Write,Grep,Glob'

          # Review Authority
          review-authority: 'full'    # Can approve, request changes, or comment
          approve-threshold: 'strict' # Approve only if zero MEDIUM+ findings
          approve-max-files: '30'     # Only approve PRs with <= 30 files

          # Triggers
          review-label: 'claude-review'  # Must match the if: condition above
          trigger-phrase: '@claude'       # Comment trigger (excluded from author feedback)
          default-branch: 'main'         # Base branch for guide fetch

          # Behavior
          skip-if-already-reviewed: 'true'   # Skip if no new commits since last review
          include-previous-review: 'true'    # Enable re-review reconciliation
          track-cost: 'true'                 # Append cost to review
          dismiss-previous-reviews: 'true'   # Dismiss old reviews before new one

          # Deep Review (opt-in via label)
          review-depth: 'normal'                   # Default depth for all PRs
          deep-review-label: 'claude-deep-review'  # Label that triggers deep review
          deep-review-model: ''                    # Empty = same model; set to 'claude-opus-4-6' for deeper analysis
          deep-max-files: '20'                     # Deep reviews capped at 20 files (cost scales faster)
          deep-max-turns: '50'                     # More turns for flow tracing
