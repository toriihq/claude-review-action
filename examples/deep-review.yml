# Deep Review example — normal by default, deep when claude-deep-review label is applied.
# Deep mode generates per-file diffs and instructs Claude to trace callers, importers, and tests.
name: Claude Code Review (with Deep Review)

on:
  pull_request:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Deep reviews with Opus can take 30-50 minutes
    if: |
      (github.event_name == 'pull_request' &&
        (github.event.label.name == 'claude-review' ||
         github.event.label.name == 'claude-deep-review')) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
      checks: read
    steps:
      - uses: toriihq/claude-review-action@v1
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          review-guide-path: .github/claude-review-guide.md

          # Normal review by default; deep when claude-deep-review label is applied
          review-depth: 'normal'
          deep-review-label: 'claude-deep-review'
          deep-review-model: 'claude-opus-4-6'   # Optional: use Opus for deep reviews
          deep-max-files: '20'                    # Deep reviews capped at 20 files
          deep-max-turns: '50'                    # More turns for flow tracing
