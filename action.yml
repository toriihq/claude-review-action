name: 'Claude Code Review'
description: 'AI-powered code review using Claude. Handles diff capture, re-review reconciliation, cost tracking, and configurable review authority.'
author: 'toriihq'

branding:
  icon: 'eye'
  color: 'purple'

inputs:
  # Required
  anthropic-api-key:
    description: 'Anthropic API key'
    required: true

  # Review Content
  review-guide-path:
    description: 'Path to repo review guide markdown. Empty = no guide.'
    required: false
    default: ''
  critical-rules:
    description: 'Multiline string of BLOCKER-level rules injected into prompt'
    required: false
    default: ''
  extra-prompt:
    description: 'Appended to end of prompt (custom instructions)'
    required: false
    default: ''
  include-pr-description:
    description: 'Feed PR title+body into review prompt'
    required: false
    default: 'true'
  context-intro:
    description: 'Opening line of prompt (repo identity/context)'
    required: false
    default: 'You are a code reviewer.'

  # Limits
  max-files:
    description: 'Skip review if PR exceeds this many files'
    required: false
    default: '50'
  max-diff-lines:
    description: 'Truncate diff after N lines'
    required: false
    default: '3000'
  max-diff-bytes:
    description: 'Truncate diff after N bytes'
    required: false
    default: '80000'
  max-turns:
    description: 'Claude conversation turn limit'
    required: false
    default: '30'
  timeout-minutes:
    description: 'Job timeout (informational — consumer workflow controls actual timeout)'
    required: false
    default: '20'

  # Model & Tools
  model:
    description: 'Claude model to use'
    required: false
    default: 'claude-sonnet-4-6'
  allowed-tools:
    description: 'Tools Claude can use during review'
    required: false
    default: 'Bash,Read,Write,Grep,Glob'

  # Review Authority
  review-authority:
    description: 'Review authority level: comment-only, request-changes, or full'
    required: false
    default: 'request-changes'
  approve-threshold:
    description: 'For full mode: strict (zero MEDIUM+) or normal (zero HIGH+)'
    required: false
    default: 'strict'
  approve-max-files:
    description: 'For full mode: only approve PRs with <= N files'
    required: false
    default: '50'

  # Triggers
  review-label:
    description: 'Label name passed to claude-code-action label_trigger. Must match consumer workflow if: condition.'
    required: false
    default: 'claude-review'
  trigger-phrase:
    description: 'Comment trigger phrase (used to exclude trigger comments from author feedback)'
    required: false
    default: '@claude'
  default-branch:
    description: 'Base branch for guide fetch and config restore. Empty = auto-detect from repo settings.'
    required: false
    default: ''

  # Behavior
  skip-if-already-reviewed:
    description: 'Skip on label trigger if no new commits since last review'
    required: false
    default: 'true'
  include-previous-review:
    description: 'Enable re-review reconciliation with previous findings'
    required: false
    default: 'true'
  track-cost:
    description: 'Append cost/turns/model to review comment'
    required: false
    default: 'true'
  dismiss-previous-reviews:
    description: 'Dismiss old Claude reviews before posting new one'
    required: false
    default: 'true'

  # Deep Review
  review-depth:
    description: 'Review depth: normal (diff-first) or deep (per-file diffs + flow tracing)'
    required: false
    default: 'normal'
  deep-review-label:
    description: 'Label that overrides review-depth to deep (applied per-PR)'
    required: false
    default: 'claude-deep-review'
  deep-review-model:
    description: 'Model override for deep reviews. Empty = use the model input.'
    required: false
    default: ''
  deep-max-files:
    description: 'Skip deep review if PR exceeds this many files (deep mode cost scales faster)'
    required: false
    default: '20'
  deep-max-turns:
    description: 'Claude turn limit for deep reviews (needs more turns than normal)'
    required: false
    default: '50'

runs:
  using: 'composite'
  steps:
    - name: Resolve PR
      id: resolve-pr
      shell: bash
      run: bash ${{ github.action_path }}/scripts/resolve-pr.sh
      env:
        GH_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        EVENT_NAME: ${{ github.event_name }}
        EVENT_JSON: ${{ toJSON(github.event) }}
        DEEP_REVIEW_LABEL: ${{ inputs.deep-review-label }}

    - name: Validate inputs
      shell: bash
      run: bash ${{ github.action_path }}/scripts/validate-inputs.sh
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        REVIEW_AUTHORITY: ${{ inputs.review-authority }}
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ steps.resolve-pr.outputs.pr_number }}
        REVIEW_DEPTH: ${{ inputs.review-depth }}

    - name: Checkout PR
      uses: actions/checkout@v4
      with:
        ref: ${{ steps.resolve-pr.outputs.pr_sha }}
        fetch-depth: 1

    - name: Fetch review guide
      if: inputs.review-guide-path != ''
      id: fetch-guide
      shell: bash
      run: bash ${{ github.action_path }}/scripts/fetch-guide.sh
      env:
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        GUIDE_PATH: ${{ inputs.review-guide-path }}
        DEFAULT_BRANCH: ${{ inputs.default-branch }}

    - name: Resolve review depth
      id: resolve-depth
      shell: bash
      run: |
        # Determine effective depth (label override takes precedence)
        if [ "$IS_DEEP_LABEL" = "true" ]; then
          DEPTH="deep"
        else
          DEPTH="$REVIEW_DEPTH"
        fi
        echo "effective_depth=$DEPTH" >> "$GITHUB_OUTPUT"

        # Determine effective model
        if [ "$DEPTH" = "deep" ] && [ -n "$DEEP_REVIEW_MODEL" ]; then
          echo "effective_model=$DEEP_REVIEW_MODEL" >> "$GITHUB_OUTPUT"
        else
          echo "effective_model=$MODEL" >> "$GITHUB_OUTPUT"
        fi

        # Determine effective max turns
        if [ "$DEPTH" = "deep" ]; then
          echo "effective_max_turns=$DEEP_MAX_TURNS" >> "$GITHUB_OUTPUT"
        else
          echo "effective_max_turns=$MAX_TURNS" >> "$GITHUB_OUTPUT"
        fi

        echo "::notice::Review depth: $DEPTH"
      env:
        IS_DEEP_LABEL: ${{ steps.resolve-pr.outputs.is_deep_label }}
        REVIEW_DEPTH: ${{ inputs.review-depth }}
        DEEP_REVIEW_MODEL: ${{ inputs.deep-review-model }}
        MODEL: ${{ inputs.model }}
        MAX_TURNS: ${{ inputs.max-turns }}
        DEEP_MAX_TURNS: ${{ inputs.deep-max-turns }}

    - name: Capture context
      id: capture-context
      shell: bash
      run: bash ${{ github.action_path }}/scripts/capture-context.sh
      env:
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ steps.resolve-pr.outputs.pr_number }}
        MAX_FILES: ${{ inputs.max-files }}
        MAX_DIFF_LINES: ${{ inputs.max-diff-lines }}
        MAX_DIFF_BYTES: ${{ inputs.max-diff-bytes }}
        INCLUDE_PR_DESCRIPTION: ${{ inputs.include-pr-description }}
        REVIEW_DEPTH: ${{ steps.resolve-depth.outputs.effective_depth }}
        DEEP_MAX_FILES: ${{ inputs.deep-max-files }}

    - name: Detect previous review
      if: steps.capture-context.outputs.skipped != 'true'
      id: detect-previous
      shell: bash
      run: bash ${{ github.action_path }}/scripts/detect-previous.sh
      env:
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ steps.resolve-pr.outputs.pr_number }}
        EVENT_TYPE: ${{ steps.resolve-pr.outputs.event_type }}
        SKIP_IF_ALREADY_REVIEWED: ${{ inputs.skip-if-already-reviewed }}
        REVIEW_DEPTH: ${{ steps.resolve-depth.outputs.effective_depth }}

    - name: Fetch author comments
      if: steps.capture-context.outputs.skipped != 'true' && steps.detect-previous.outputs.has_previous == 'true' && inputs.include-previous-review == 'true'
      id: fetch-comments
      shell: bash
      run: bash ${{ github.action_path }}/scripts/fetch-comments.sh
      env:
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ steps.resolve-pr.outputs.pr_number }}
        LAST_REVIEW_DATE: ${{ steps.detect-previous.outputs.last_review_date }}
        TRIGGER_PHRASE: ${{ inputs.trigger-phrase }}

    - name: Post deep review pre-flight comment
      if: |
        steps.capture-context.outputs.skipped != 'true' &&
        steps.resolve-depth.outputs.effective_depth == 'deep'
      shell: bash
      run: |
        TOTAL_FILES=$(wc -l < /tmp/changed-files-stats.txt | tr -d ' ')
        gh pr comment "$PR_NUMBER" --repo "$REPO" \
          --body "🔍 Starting **deep review** of $TOTAL_FILES files. This will read each file's diff, source, callers, and tests." || true
      env:
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ steps.resolve-pr.outputs.pr_number }}

    - name: Build prompt
      if: steps.capture-context.outputs.skipped != 'true'
      id: build-prompt
      shell: bash
      run: bash ${{ github.action_path }}/scripts/build-prompt.sh
      env:
        ACTION_PATH: ${{ github.action_path }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ steps.resolve-pr.outputs.pr_number }}
        EVENT_TYPE: ${{ steps.resolve-pr.outputs.event_type }}
        USER_COMMENT: ${{ steps.resolve-pr.outputs.user_comment }}
        HAS_PREVIOUS: ${{ steps.detect-previous.outputs.has_previous }}
        NEW_COMMITS: ${{ steps.detect-previous.outputs.commits }}
        INCLUDE_PREVIOUS_REVIEW: ${{ inputs.include-previous-review }}
        CONTEXT_INTRO: ${{ inputs.context-intro }}
        CRITICAL_RULES: ${{ inputs.critical-rules }}
        EXTRA_PROMPT: ${{ inputs.extra-prompt }}
        REVIEW_AUTHORITY: ${{ inputs.review-authority }}
        APPROVE_THRESHOLD: ${{ inputs.approve-threshold }}
        APPROVE_MAX_FILES: ${{ inputs.approve-max-files }}
        DISMISS_PREVIOUS_REVIEWS: ${{ inputs.dismiss-previous-reviews }}
        FILE_COUNT: ${{ steps.capture-context.outputs.file_count }}
        REVIEW_DEPTH: ${{ steps.resolve-depth.outputs.effective_depth }}

    - name: Run Claude Code Review
      if: steps.capture-context.outputs.skipped != 'true'
      id: claude-review
      continue-on-error: true
      uses: anthropics/claude-code-action@v1
      with:
        anthropic_api_key: ${{ inputs.anthropic-api-key }}
        base_branch: ${{ inputs.default-branch || github.event.repository.default_branch }}
        allowed_bots: ''
        track_progress: false
        show_full_output: true
        label_trigger: ${{ inputs.review-label }}
        prompt: ${{ steps.build-prompt.outputs.prompt }}
        claude_args: |
          --max-turns ${{ steps.resolve-depth.outputs.effective_max_turns }}
          --model ${{ steps.resolve-depth.outputs.effective_model }}
          --allowedTools "${{ inputs.allowed-tools }}"

    - name: Post failure comment
      if: steps.capture-context.outputs.skipped != 'true' && steps.claude-review.outcome == 'failure'
      shell: bash
      run: bash ${{ github.action_path }}/scripts/post-failure.sh
      env:
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ steps.resolve-pr.outputs.pr_number }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        MAX_TURNS: ${{ steps.resolve-depth.outputs.effective_max_turns }}
        TIMEOUT_MINUTES: ${{ inputs.timeout-minutes }}

    - name: Report cost
      if: always() && steps.capture-context.outputs.skipped != 'true' && inputs.track-cost == 'true'
      shell: bash
      run: bash ${{ github.action_path }}/scripts/report-cost.sh
      env:
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ steps.resolve-pr.outputs.pr_number }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        CLAUDE_OUTCOME: ${{ steps.claude-review.outcome }}
